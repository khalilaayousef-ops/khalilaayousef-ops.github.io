<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khalil Ayman | Portfolio</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#020617;color:#fff;line-height:1.6;}

h1,h2,h3{letter-spacing:1px;}

header{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(135deg,#020617,#0f172a);
}

header h1{font-size:50px;}
header p{color:#94a3b8;margin:10px 0;}

.btn{
padding:12px 25px;
background:#38bdf8;
border-radius:6px;
display:inline-block;
margin-top:10px;
color:#fff;
transition:.3s;
}
.btn:hover{background:#0ea5e9;}

nav{
background:#020617;
position:sticky;
top:0;
z-index:1000;
border-bottom:1px solid #1e293b;
}
nav ul{
display:flex;
justify-content:center;
list-style:none;
}
nav li{margin:0 15px;}
nav a{
color:#fff;
padding:15px;
display:block;
}
nav a:hover{color:#38bdf8;}

section{
max-width:1100px;
margin:auto;
padding:80px 20px;
}

h2{text-align:center;margin-bottom:40px;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:#0f172a;
padding:20px;
border-radius:10px;
text-align:center;
transition:.3s;
border:1px solid #1e293b;
cursor:pointer;
}
.card:hover{
transform:translateY(-5px);
border-color:#38bdf8;
}

.tabs{text-align:center;margin-bottom:30px;}
.tab-btn{
padding:10px 15px;
margin:5px;
border:none;
background:#0f172a;
color:white;
cursor:pointer;
border-radius:6px;
}
.tab-btn.active{background:#38bdf8;}

.tab-content{display:none;}
.tab-content.active{display:block;}

footer{
text-align:center;
padding:20px;
border-top:1px solid #1e293b;
}

/* Popup */
#popup{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
z-index:3000;
}
.popup-box{
background:#0f172a;
padding:25px;
border-radius:10px;
width:90%;
max-width:500px;
text-align:center;
}

/* WhatsApp */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px 18px;
border-radius:50%;
font-size:22px;
z-index:4000;
}
</style>
</head>

<body>

<header>
<h1>Khalil Ayman</h1>
<p>Creative Content Creator</p>
<a class="btn" href="#projects">View Work</a>
</header>

<nav>
<ul>
<li><a href="#projects">Works</a></li>
<li><a href="#contact">Contact</a></li>
</ul>
</nav>

<section id="projects">
<h2>Creative Works</h2>

<div class="tabs">
<button class="tab-btn active" onclick="openTab(event,'rest')">Restaurants</button>
<button class="tab-btn" onclick="openTab(event,'cosmetics')">Cosmetics</button>
<button class="tab-btn" onclick="openTab(event,'design')">Design</button>
<button class="tab-btn" onclick="openTab(event,'shoes')">Shoes</button>
<button class="tab-btn" onclick="openTab(event,'medical')">Medical</button>
<button class="tab-btn" onclick="openTab(event,'barber')">Barber</button>
<button class="tab-btn" onclick="openTab(event,'ads')">Ads</button>
</div>

<div id="rest" class="tab-content active">
<div class="grid">
<div class="card" onclick="openBrand('hirisk')">Hi Risk</div>
<div class="card" onclick="openBrand('hameed')">Hameed</div>
</div>
</div>

<div id="cosmetics" class="tab-content">
<div class="grid">
<div class="card" onclick="openBrand('ceramed')">Ceramed</div>
</div>
</div>

<div id="design" class="tab-content">
<div class="grid">
<div class="card" onclick="openBrand('mokbel')">Mokbel</div>
</div>
</div>

<div id="shoes" class="tab-content">
<div class="grid">
<div class="card" onclick="openBrand('calzolaio')">Calzolaio</div>
</div>
</div>

<div id="medical" class="tab-content">
<div class="grid">
<div class="card" onclick="openBrand('almoudawah')">Almoudawah</div>
</div>
</div>

<div id="barber" class="tab-content">
<div class="grid">
<div class="card" onclick="openBrand('flebiny')">Flebiny Salon</div>
</div>
</div>

<div id="ads" class="tab-content">
<div class="grid">
<div class="card" onclick="openBrand('ads')">Advertisements</div>
</div>
</div>

</section>

<section id="contact">
<h2>Contact</h2>
<div class="card">
📞 01115002997<br>
✉ khalil.aayousef@gmail.com
</div>
</section>

<footer>© 2026 Khalil Ayman</footer>

<!-- Popup -->
<div id="popup" onclick="closePopup()">
<div class="popup-box" onclick="event.stopPropagation()">
<h2 id="title"></h2>
<p id="desc"></p>
<div id="links"></div>
</div>
</div>

<!-- WhatsApp -->
<a class="whatsapp" href="https://wa.me/201115002997" target="_blank">💬</a>

<script>
function openTab(evt,id){
document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
document.getElementById(id).classList.add("active");
evt.currentTarget.classList.add("active");
}

function openBrand(b){

const data={

hirisk:{title:"Hi Risk",desc:"Restaurant content",links:[["Instagram","https://www.instagram.com/hiriskcafe"]]},
hameed:{title:"Hameed",desc:"Food content",links:[["Instagram","https://www.instagram.com/hameedegypt"]]},
ceramed:{title:"Ceramed",desc:"Cosmetics content",links:[["Instagram","https://www.instagram.com/ceramed.pharma"]]},
mokbel:{title:"Mokbel",desc:"Architecture content",links:[["Instagram","https://www.instagram.com/mokbeldesignco"]]},
calzolaio:{title:"Calzolaio",desc:"Italian branding",links:[["Instagram","https://www.instagram.com/calzolaioegypt"]]},
almoudawah:{title:"Almoudawah",desc:"Medical content",links:[["Instagram","https://www.instagram.com/almoudawah"]]},
flebiny:{title:"Flebiny",desc:"Barber brand",links:[["Work","https://drive.google.com"]]},
ads:{title:"Ads",desc:"Campaigns",links:[["Christmas","https://vt.tiktok.com"]]}
};

let item=data[b];

document.getElementById("title").innerText=item.title;
document.getElementById("desc").innerText=item.desc;

let html="";
item.links.forEach(l=>{
html+=`<a class="btn" href="${l[1]}" target="_blank">${l[0]}</a><br>`;
});

document.getElementById("links").innerHTML=html;
document.getElementById("popup").style.display="flex";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}
</script>

</body>
</html>
