<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khalil Ayman | Creative Portfolio</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#0f172a;color:white;}
a{text-decoration:none;color:#38bdf8;}

header{height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;}
.btn{margin:10px;padding:10px 20px;background:#38bdf8;border-radius:6px;color:white;}

nav{background:#020617;position:sticky;top:0;}
nav ul{display:flex;justify-content:center;list-style:none;}
nav li{margin:0 15px;}
nav a{color:white;padding:15px;display:block;}

section{max-width:1100px;margin:auto;padding:60px 20px;}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;}
.card{background:#1e293b;padding:20px;border-radius:10px;text-align:center;cursor:pointer;}

.tabs{text-align:center;margin-bottom:20px;}
.tab-btn{padding:10px;margin:5px;background:#1e293b;border:none;color:white;border-radius:6px;cursor:pointer;}
.tab-btn.active{background:#38bdf8;}
.tab-content{display:none;}
.tab-content.active{display:block;}

.popup{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.9);
display:none;justify-content:center;align-items:center;
}

.popup-box{
background:#1e293b;padding:20px;border-radius:10px;width:90%;max-width:400px;text-align:center;
}
</style>
</head>

<body>

<header>
<h1>Khalil Ayman</h1>
<p>Creative Content Creator</p>
</header>

<section id="projects">
<h2>Creative Works</h2>

<div class="tabs">
<button class="tab-btn active" onclick="openTab(event,'rest')">Restaurants</button>
<button class="tab-btn" onclick="openTab(event,'cosmetics')">Cosmetics</button>
<button class="tab-btn" onclick="openTab(event,'design')">Design</button>
<button class="tab-btn" onclick="openTab(event,'shoes')">Shoes</button>
<button class="tab-btn" onclick="openTab(event,'medical')">Medical</button>
<button class="tab-btn" onclick="openTab(event,'barber')">Barber</button>
<button class="tab-btn" onclick="openTab(event,'ads')">Ads</button>
</div>

<div id="rest" class="tab-content active">
<div class="grid">
<div class="card" onclick="openBrand('hirisk')">Hi Risk</div>
<div class="card" onclick="openBrand('hameed')">Hameed</div>
</div>
</div>

<div id="cosmetics" class="tab-content">
<div class="grid">
<div class="card" onclick="openBrand('ceramed')">Ceramed</div>
</div>
</div>

<div id="design" class="tab-content">
<div class="grid">
<div class="card" onclick="openBrand('mokbel')">Mokbel</div>
</div>
</div>

<div id="shoes" class="tab-content">
<div class="grid">
<div class="card" onclick="openBrand('calzolaio')">Calzolaio</div>
</div>
</div>

<div id="medical" class="tab-content">
<div class="grid">
<div class="card" onclick="openBrand('almoudawah')">Almoudawah</div>
</div>
</div>

<div id="barber" class="tab-content">
<div class="grid">
<div class="card" onclick="openBrand('flebiny')">Flebiny Salon</div>
</div>
</div>

<div id="ads" class="tab-content">
<div class="grid">
<div class="card" onclick="openBrand('ads')">Advertisements</div>
</div>
</div>

</section>

<!-- Popup -->
<div id="popup" class="popup" onclick="closePopup()">
<div class="popup-box" onclick="event.stopPropagation()">
<h2 id="title"></h2>
<p id="desc"></p>
<div id="links"></div>
</div>
</div>

<script>

function openTab(evt, id){
document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
document.getElementById(id).classList.add("active");
evt.currentTarget.classList.add("active");
}

function openBrand(b){

const data={

hirisk:{
title:"Hi Risk",
desc:"High-impact content enhancing brand identity.",
links:[
["Instagram","https://www.instagram.com/hiriskcafe"],
["TikTok","https://www.tiktok.com/@hi_risk1"]
]
},

ceramed:{
title:"Ceramed",
desc:"Cosmetics brand content.",
links:[
["Instagram","https://www.instagram.com/ceramed.pharma"]
]
},

hameed:{
title:"Hameed",
desc:"Restaurant storytelling content.",
links:[
["Instagram","https://www.instagram.com/hameedegypt"]
]
},

mokbel:{
title:"Mokbel",
desc:"Architecture & design content.",
links:[
["Instagram","https://www.instagram.com/mokbeldesignco"]
]
},

calzolaio:{
title:"Calzolaio",
desc:"Italian-style brand storytelling.",
links:[
["Instagram","https://www.instagram.com/calzolaioegypt"]
]
},

almoudawah:{
title:"Almoudawah",
desc:"Medical & rehabilitation content.",
links:[
["Instagram","https://www.instagram.com/almoudawah"]
]
},

flebiny:{
title:"Flebiny Salon",
desc:"Premium barber content.",
links:[
["Works","https://drive.google.com/drive/folders/1cU50kiA03-uOSvTkqK-fW02kgTCDMX7G"]
]
},

ads:{
title:"Advertisements",
desc:"Creative campaigns.",
links:[
["Christmas","https://vt.tiktok.com/ZSHY1pSfk/"],
["Vlog","https://drive.google.com/file/d/1aeLtUCkgWUGnuYmayYFvfFtHO6Fvd8n-/view"]
]
}

};

let item=data[b];

document.getElementById("title").innerText=item.title;
document.getElementById("desc").innerText=item.desc;

let html="";
item.links.forEach(l=>{
html+=`<a href="${l[1]}" target="_blank" class="btn">${l[0]}</a><br>`;
});

document.getElementById("links").innerHTML=html;
document.getElementById("popup").style.display="flex";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

</script>

</body>
</html>
