<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khalil Ayman | Creative Portfolio</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#0f172a;color:white}

header{height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
header h1{font-size:48px}
header p{color:#cbd5f5}

.btn{margin-top:10px;padding:10px 20px;background:#38bdf8;border:none;border-radius:6px;color:white;cursor:pointer}

nav{background:#020617;position:sticky;top:0}
nav ul{display:flex;justify-content:center;list-style:none}
nav li{margin:0 15px}
nav a{color:white;padding:15px;display:block}

section{padding:60px 20px;max-width:1100px;margin:auto}
h2{text-align:center;margin-bottom:30px}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
.card{background:#1e293b;padding:20px;border-radius:10px;text-align:center;cursor:pointer}

.card img{width:100%;border-radius:8px}

.tab-content{display:none}
.tab-content.active{display:block}

#popup{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
}

.popup-box{background:#1e293b;padding:20px;border-radius:10px;text-align:center}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:12px;
border-radius:50%;
}
</style>
</head>

<body>

<a href="https://wa.me/201115002997" class="whatsapp">
<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" width="30">
</a>

<header>
<h1>Khalil Ayman Abdelaziz</h1>
<p>Creative Content Creator</p>
<a class="btn" href="#projects">My Work</a>
</header>

<nav>
<ul>
<li><a href="#achievements">Achievements</a></li>
<li><a href="#projects">Works</a></li>
<li><a href="#contact">Contact</a></li>
</ul>
</nav>

<!-- Achievements -->
<section id="achievements">
<h2>Achievements</h2>
<div class="grid">
<img src="images/award1.jpg">
<img src="images/award2.jpg">
<img src="images/award3.jpg">
<img src="images/award4.jpg">
</div>
</section>

<!-- Creative Works -->
<section id="projects">
<h2>Creative Works</h2>

<button class="btn" onclick="openTab('rest')">Restaurants</button>
<button class="btn" onclick="openTab('ads')">Ads</button>

<div id="rest" class="tab-content active">
<div class="grid">
<div class="card" onclick="openBrand('hirisk')">Hi Risk</div>
<div class="card" onclick="openBrand('hameed')">Hameed</div>
</div>
</div>

<div id="ads" class="tab-content">
<div class="grid">
<div class="card" onclick="openBrand('ads')">Ads</div>
</div>
</div>
</section>

<!-- Popup -->
<div id="popup" onclick="this.style.display='none'">
<div class="popup-box" onclick="event.stopPropagation()">
<h2 id="title"></h2>
<p id="desc"></p>
<div id="links"></div>
</div>
</div>

<!-- Contact -->
<section id="contact">
<h2>Contact</h2>
<p>📞 201115002997</p>
<p>📍 Giza</p>
</section>

<script>
function openTab(id){
document.querySelectorAll(".tab-content").forEach(e=>e.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function openBrand(b){
const data={
hirisk:{title:"Hi Risk",desc:"Restaurant",links:[["Instagram","#"]]},
hameed:{title:"Hameed",desc:"Restaurant",links:[["Instagram","#"]]},
ads:{title:"Ads",desc:"Campaigns",links:[["TikTok","#"]]}
};

let item=data[b];

document.getElementById("title").innerText=item.title;
document.getElementById("desc").innerText=item.desc;

let html="";
item.links.forEach(l=>{
html+=`<a href="${l[1]}" target="_blank" class="btn">${l[0]}</a><br>`;
});

document.getElementById("links").innerHTML=html;
document.getElementById("popup").style.display="flex";
}
</script>

</body>
</html>
