<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khalil Ayman | Creative Portfolio</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:Arial; }
body { background:#0f172a; color:white; line-height:1.6; }
a { text-decoration:none; color:#38bdf8; }

header { height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; padding:20px; }
header h1 { font-size:48px; margin-bottom:10px; }
header p { font-size:20px; color:#cbd5f5; }

.btn { margin-top:15px; padding:12px 25px; background:#38bdf8; border:none; border-radius:6px; color:white; display:inline-block; cursor:pointer; }

nav { background:#020617; position:sticky; top:0; z-index:1000; }
nav ul { display:flex; justify-content:center; list-style:none; }
nav li { margin:0 20px; }
nav a { color:white; display:block; padding:15px; }
nav a:hover { color:#38bdf8; }

section { max-width:1100px; margin:auto; padding:80px 20px; }
h2 { text-align:center; margin-bottom:40px; font-size:32px; }

.grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:25px; }

.card { background:#1e293b; padding:20px; border-radius:10px; text-align:center; transition:.3s; cursor:pointer; }
.card:hover { transform:translateY(-5px); }

footer { background:#020617; text-align:center; padding:20px; }

/* popup */
#brandPopup {
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
z-index:3000;
}
#brandPopup .content {
background:#1e293b;
padding:25px;
border-radius:10px;
max-width:500px;
width:90%;
text-align:center;
}

/* tabs */
.tab-content{display:none;}
.tab-content.active{display:block;}
</style>
</head>

<body>

<header>
<h1>Khalil Ayman Abdelaziz</h1>
<p>Creative Content Creator | Freelancer</p>
<p>Haram St., Giza – Egypt</p>

<a class="btn" href="#projects">View My Work</a>
<a class="btn" href="Khalil_Ayman_CV.pdf" download>Download CV</a>
</header>

<nav>
<ul>
<li><a href="#about">About</a></li>
<li><a href="#education">Education</a></li>
<li><a href="#skills">Skills</a></li>
<li><a href="#achievements">Achievements</a></li>
<li><a href="#projects">Works</a></li>
<li><a href="#contact">Contact</a></li>
</ul>
</nav>

<section id="projects">
<h2>Creative Works</h2>

<!-- Tabs -->
<div style="text-align:center;margin-bottom:30px;">
<button class="btn" onclick="openTab(event,'rest')">Restaurants</button>
<button class="btn" onclick="openTab(event,'cosmetics')">Cosmetics</button>
<button class="btn" onclick="openTab(event,'design')">Design</button>
<button class="btn" onclick="openTab(event,'shoes')">Shoes</button>
<button class="btn" onclick="openTab(event,'medical')">Medical</button>
<button class="btn" onclick="openTab(event,'barber')">Barber</button>
<button class="btn" onclick="openTab(event,'ads')">Ads</button>
</div>

<div id="rest" class="tab-content active">
<div class="grid">
<div class="card" onclick="openBrand('hirisk')">Hi Risk</div>
<div class="card" onclick="openBrand('hameed')">Hameed</div>
</div>
</div>

<div id="cosmetics" class="tab-content">
<div class="grid"><div class="card" onclick="openBrand('ceramed')">Ceramed</div></div>
</div>

<div id="design" class="tab-content">
<div class="grid"><div class="card" onclick="openBrand('mokbel')">Mokbel</div></div>
</div>

<div id="shoes" class="tab-content">
<div class="grid"><div class="card" onclick="openBrand('calzolaio')">Calzolaio</div></div>
</div>

<div id="medical" class="tab-content">
<div class="grid"><div class="card" onclick="openBrand('almoudawah')">Almoudawah</div></div>
</div>

<div id="barber" class="tab-content">
<div class="grid"><div class="card" onclick="openBrand('flebiny')">Flebiny Salon</div></div>
</div>

<div id="ads" class="tab-content">
<div class="grid"><div class="card" onclick="openBrand('ads')">Advertisements</div></div>
</div>

</section>

<!-- Popup -->
<div id="brandPopup" onclick="closePopup()">
<div class="content" onclick="event.stopPropagation()">
<h2 id="brandTitle"></h2>
<p id="brandDesc"></p>
<div id="brandLinks"></div>
</div>
</div>

<script>
function openTab(evt, tab){
document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
document.getElementById(tab).classList.add("active");
}

function openBrand(brand){

const data={

hirisk:{title:"Hi Risk",desc:"Restaurant & cafe.",links:[
{title:"Instagram",url:"https://www.instagram.com/hiriskcafe"},
{title:"TikTok",url:"https://www.tiktok.com/@hi_risk1"}
]},

hameed:{title:"Hameed",desc:"Food content.",links:[
{title:"Instagram",url:"https://www.instagram.com/hameedegypt"},
{title:"TikTok",url:"https://www.tiktok.com/@hameedeg"}
]},

ceramed:{title:"Ceramed",desc:"Cosmetics.",links:[
{title:"Instagram",url:"https://www.instagram.com/ceramed.pharma"},
{title:"TikTok",url:"https://www.tiktok.com/@ceramed.pharma"}
]},

mokbel:{title:"Mokbel Design",desc:"Architecture.",links:[
{title:"Instagram",url:"https://www.instagram.com/mokbeldesignco"},
{title:"TikTok",url:"https://www.tiktok.com/@mokbel.designco"}
]},

calzolaio:{title:"Calzolaio",desc:"Brand storytelling.",links:[
{title:"Instagram",url:"https://www.instagram.com/calzolaioegypt"},
{title:"TikTok",url:"https://www.tiktok.com/@calzolaioegypt"}
]},

almoudawah:{title:"Almoudawah",desc:"Medical.",links:[
{title:"Instagram",url:"https://www.instagram.com/almoudawah"}
]},

flebiny:{title:"Flebiny Salon",desc:"Barber.",links:[
{title:"Work",url:"https://drive.google.com/drive/folders/1cU50kiA03-uOSvTkqK-fW02kgTCDMX7G"},
{title:"Instagram",url:"https://www.instagram.com/flebiny_salon"}
]},

ads:{title:"Advertisements",desc:"Campaigns.",links:[
{title:"Christmas",url:"https://vt.tiktok.com/ZSHY1pSfk/"},
{title:"Vlog",url:"https://drive.google.com/file/d/1aeLtUCkgWUGnuYmayYFvfFtHO6Fvd8n-/view"}
]}

};

let item=data[brand];

document.getElementById("brandTitle").innerText=item.title;
document.getElementById("brandDesc").innerText=item.desc;

let html="";
item.links.forEach(l=>{
html+=`<a href="${l.url}" target="_blank" class="btn">${l.title}</a><br>`;
});

document.getElementById("brandLinks").innerHTML=html;
document.getElementById("brandPopup").style.display="flex";
}

function closePopup(){
document.getElementById("brandPopup").style.display="none";
}
</script>

</body>
</html>
