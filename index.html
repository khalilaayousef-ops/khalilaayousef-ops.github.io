<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khalil Ayman | Portfolio</title>

<style>

/* ===== GLOBAL ===== */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{
background:linear-gradient(135deg,#020617,#0f172a);
color:#fff;
}

/* ===== HEADER ===== */
header{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}
header h1{font-size:50px;letter-spacing:1px;}
header p{color:#aaa;margin-top:10px;}
.btn{
margin-top:20px;
padding:12px 25px;
background:#fff;
color:#000;
border-radius:8px;
display:inline-block;
font-weight:bold;
}

/* ===== NAV ===== */
nav{
position:sticky;
top:0;
background:#000;
padding:10px;
z-index:999;
}
nav ul{display:flex;justify-content:center;list-style:none;}
nav li{margin:0 15px;}
nav a{color:#fff;}
nav a:hover{color:#ccc;}

/* ===== SECTIONS ===== */
section{padding:80px 20px;max-width:1100px;margin:auto;}
h2{text-align:center;margin-bottom:40px;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:#111;
padding:20px;
border-radius:12px;
text-align:center;
transition:.3s;
border:1px solid #222;
}
.card:hover{
transform:translateY(-5px);
box-shadow:0 0 20px rgba(255,255,255,0.1);
cursor:pointer;
}

/* ===== TABS ===== */
.tab-buttons{text-align:center;margin-bottom:20px;}
.tab-buttons button{
margin:5px;
padding:10px 15px;
background:#111;
color:#fff;
border:1px solid #333;
border-radius:6px;
cursor:pointer;
}
.tab-buttons button:hover{background:#fff;color:#000;}

.tab-content{display:none;}
.tab-content.active{display:block;}

/* ===== POPUP ===== */
#popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
z-index:1000;
}
.popup-box{
background:#111;
padding:25px;
border-radius:10px;
text-align:center;
max-width:400px;
width:90%;
}
.popup-box a{
display:block;
margin:10px;
padding:10px;
background:#fff;
color:#000;
border-radius:6px;
}

/* ===== WHATSAPP BUTTON ===== */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
width:60px;
height:60px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
color:white;
cursor:pointer;
box-shadow:0 0 15px rgba(0,0,0,0.5);
z-index:999;
}

/* ===== FOOTER ===== */
footer{text-align:center;padding:20px;background:#000;color:#aaa;}

</style>
</head>

<body>

<header>
<h1>Khalil Ayman</h1>
<p>Creative Content Creator</p>
<a href="#projects" class="btn">View Work</a>
</header>

<nav>
<ul>
<li><a href="#projects">Works</a></li>
<li><a href="#contact">Contact</a></li>
</ul>
</nav>

<!-- ===== PROJECTS ===== -->
<section id="projects">
<h2>Creative Works</h2>

<div class="tab-buttons">
<button onclick="openTab('rest')">Restaurants</button>
<button onclick="openTab('cosmetics')">Cosmetics</button>
<button onclick="openTab('design')">Design</button>
<button onclick="openTab('barber')">Barber</button>
<button onclick="openTab('ads')">Ads</button>
</div>

<div id="rest" class="tab-content active">
<div class="grid">
<div class="card" onclick="openBrand('hirisk')">Hi Risk</div>
<div class="card" onclick="openBrand('hameed')">Hameed</div>
</div>
</div>

<div id="cosmetics" class="tab-content">
<div class="grid">
<div class="card" onclick="openBrand('ceramed')">Ceramed</div>
</div>
</div>

<div id="design" class="tab-content">
<div class="grid">
<div class="card" onclick="openBrand('mokbel')">Mokbel</div>
</div>
</div>

<div id="barber" class="tab-content">
<div class="grid">
<div class="card" onclick="openBrand('flebiny')">Flebiny</div>
</div>
</div>

<div id="ads" class="tab-content">
<div class="grid">
<div class="card" onclick="openBrand('ads')">Ads</div>
</div>
</div>

</section>

<!-- ===== CONTACT ===== -->
<section id="contact">
<h2>Contact</h2>
<div class="card">
📞 01115002997 <br>
📞 01273117296 <br>
✉ Khalil.aayousef@gmail.com
</div>
</section>

<footer>
© 2026 Khalil Ayman
</footer>

<!-- ===== POPUP ===== -->
<div id="popup" onclick="closePopup()">
<div class="popup-box" onclick="event.stopPropagation()">
<h2 id="title"></h2>
<p id="desc"></p>
<div id="links"></div>
</div>
</div>

<!-- ===== WHATSAPP BUTTON ===== -->
<div class="whatsapp" onclick="openWhats()">
💬
</div>

<script>

/* Tabs */
function openTab(id){
document.querySelectorAll('.tab-content').forEach(el=>el.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

/* Brands */
function openBrand(b){

const data={
hirisk:{title:"Hi Risk",desc:"Restaurant content",links:[["Instagram","https://www.instagram.com/hiriskcafe"]]},
hameed:{title:"Hameed",desc:"Food content",links:[["Instagram","https://www.instagram.com/hameedegypt"]]},
ceramed:{title:"Ceramed",desc:"Cosmetics branding",links:[["Instagram","https://www.instagram.com/ceramed.pharma"]]},
mokbel:{title:"Mokbel",desc:"Architecture content",links:[["Instagram","https://www.instagram.com/mokbeldesignco"]]},
flebiny:{title:"Flebiny",desc:"Barber brand",links:[["Work","https://drive.google.com"]]},
ads:{title:"Ads",desc:"Creative campaigns",links:[["View","https://vt.tiktok.com"]]}
};

let item=data[b];

document.getElementById("title").innerText=item.title;
document.getElementById("desc").innerText=item.desc;

let html="";
item.links.forEach(l=>{
html+=`<a href="${l[1]}" target="_blank">${l[0]}</a>`;
});

document.getElementById("links").innerHTML=html;
document.getElementById("popup").style.display="flex";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

/* WhatsApp */
function openWhats(){
window.open("https://wa.me/201115002997","_blank");
}

</script>

</body>
</html>
