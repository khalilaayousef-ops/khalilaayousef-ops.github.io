<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khalil Ayman | Portfolio</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
background-image: radial-gradient(#1e3a8a 1px, transparent 1px);
background-size:30px 30px;
}

/* Header */
header{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}
h1{
font-size:48px;
background: linear-gradient(to right,#38bdf8,#22c55e);
-webkit-background-clip:text;
color:transparent;
}
header p{color:#cbd5e1;}

.btn{
margin-top:15px;
padding:12px 25px;
background:#38bdf8;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
}
.btn:hover{background:#0ea5e9}

/* Navbar */
nav{background:#020617;position:sticky;top:0;}
nav ul{display:flex;justify-content:center;list-style:none;}
nav li{margin:0 15px;}
nav a{color:white;padding:15px;display:block;}
nav a:hover{color:#38bdf8}

/* Sections */
section{max-width:1100px;margin:auto;padding:70px 20px;}
h2{text-align:center;margin-bottom:30px}

/* Grid */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

/* Cards */
.card{
background:#1e293b;
padding:15px;
border-radius:12px;
text-align:center;
cursor:pointer;
transition:.3s;
}
.card:hover{transform:translateY(-5px)}

/* Achievements images */
.card img{
width:100%;
height:200px;
object-fit:cover;
border-radius:10px;
}

/* Tabs */
.tab-content{display:none;}
.tab-content.active{display:block}

/* Popup */
#popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
z-index:2000;
}
.popup-box{
background:#1e293b;
padding:25px;
border-radius:10px;
text-align:center;
max-width:400px;
}

/* WhatsApp */
.whatsapp{
position:fixed;
bottom:25px;
right:25px;
background:#25D366;
display:flex;
align-items:center;
gap:10px;
padding:12px 18px;
border-radius:50px;
color:white;
text-decoration:none;
font-weight:bold;
}
.whatsapp img{width:24px;}
</style>
</head>

<body>

<a href="https://wa.me/201115002997" target="_blank" class="whatsapp">

<script>
function openTab(id){
document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function openBrand(b){

const data={

hirisk:{
title:"Hi Risk",
desc:"Restaurant in Tanta",
links:[
["Instagram","https://www.instagram.com/hiriskcafe"],
["TikTok","https://www.tiktok.com/@hi_risk1"]
]
},

hameed:{
title:"Hameed",
desc:"Restaurant",
links:[
["Instagram","https://www.instagram.com/hameedegypt"],
["TikTok","https://www.tiktok.com/@hameedeg"]
]
},

ceramed:{
title:"Ceramed",
desc:"Cosmetics",
links:[
["Instagram","https://www.instagram.com/ceramed.pharma"],
["TikTok","https://www.tiktok.com/@ceramed.pharma"]
]
},

mokbel:{
title:"Mokbel Design",
desc:"Architecture",
links:[
["Instagram","https://www.instagram.com/mokbeldesignco"],
["TikTok","https://www.tiktok.com/@mokbel.designco"]
]
},

ads:{
title:"Ads",
desc:"Campaigns",
links:[
["TikTok","https://vt.tiktok.com/ZSHY1pSfk/"]
]
}

};

let item=data[b];

document.getElementById("title").innerText=item.title;
document.getElementById("desc").innerText=item.desc;

let html="";
item.links.forEach(l=>{
html+=`<a href="${l[1]}" target="_blank" class="btn">${l[0]}</a><br>`;
});

document.getElementById("links").innerHTML=html;
document.getElementById("popup").style.display="flex";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}
</script>
