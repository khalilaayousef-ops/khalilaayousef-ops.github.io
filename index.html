<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khalil Ayman | GOD MODE Portfolio</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,Arial;}

body{
background:linear-gradient(135deg,#020617,#0f172a);
color:white;
}

/* Glow Background */
body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background:radial-gradient(circle,#38bdf830 1px,transparent 1px);
background-size:40px;
animation:move 20s linear infinite;
z-index:-1;
}
@keyframes move{
0%{transform:translate(0,0);}
100%{transform:translate(-200px,-200px);}
}

/* Header */
header{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}
header h1{
font-size:55px;
background:linear-gradient(90deg,#38bdf8,#22c55e);
-webkit-background-clip:text;
color:transparent;
}
header p{color:#94a3b8;margin-top:10px;}

.btn{
padding:12px 25px;
margin-top:15px;
border-radius:30px;
border:none;
background:linear-gradient(90deg,#38bdf8,#22c55e);
color:white;
cursor:pointer;
transition:.3s;
}
.btn:hover{transform:scale(1.05);}

/* Layout */
section{max-width:1100px;margin:auto;padding:80px 20px;}
h2{text-align:center;margin-bottom:30px;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

/* Cards */
.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
padding:20px;
border-radius:15px;
border:1px solid rgba(255,255,255,0.1);
cursor:pointer;
transition:.3s;
}
.card:hover{
transform:translateY(-8px);
box-shadow:0 0 20px #38bdf8;
}

/* Tabs */
.tab-content{display:none;}
.tab-content.active{display:block;}

/* Popup */
#popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}
.popup-box{
background:#0f172a;
padding:25px;
border-radius:15px;
text-align:center;
}

/* WhatsApp */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 0 20px #25D366;
z-index:1000;
transition:.3s;
}
.whatsapp:hover{transform:scale(1.1);}
.whatsapp img{width:30px;}
</style>
</head>

<body>

<header>
<h1>Khalil Ayman</h1>
<p>Elite Creative Content Creator</p>
<a class="btn" href="#projects">Explore Work</a>
</header>

<section id="projects">
<h2>Creative Works</h2>

<div style="text-align:center;margin-bottom:20px;">
<button class="btn" onclick="openTab('rest')">Restaurants</button>
<button class="btn" onclick="openTab('cosmetics')">Cosmetics</button>
<button class="btn" onclick="openTab('design')">Design</button>
<button class="btn" onclick="openTab('barber')">Barber</button>
<button class="btn" onclick="openTab('ads')">Ads</button>
</div>

<div id="rest" class="tab-content active">
<div class="grid">
<div class="card" onclick="openBrand('hirisk')">Hi Risk</div>
<div class="card" onclick="openBrand('hameed')">Hameed</div>
</div>
</div>

<div id="cosmetics" class="tab-content">
<div class="grid">
<div class="card" onclick="openBrand('ceramed')">Ceramed</div>
</div>
</div>

<div id="design" class="tab-content">
<div class="grid">
<div class="card" onclick="openBrand('mokbel')">Mokbel</div>
</div>
</div>

<div id="barber" class="tab-content">
<div class="grid">
<div class="card" onclick="openBrand('flebiny')">Flebiny</div>
</div>
</div>

<div id="ads" class="tab-content">
<div class="grid">
<div class="card" onclick="openBrand('ads')">Ads</div>
</div>
</div>

</section>

<!-- Popup -->
<div id="popup" onclick="closePopup()">
<div class="popup-box" onclick="event.stopPropagation()">
<h2 id="title"></h2>
<p id="desc"></p>
<div id="links"></div>
</div>
</div>

<!-- WhatsApp -->
<a href="https://wa.me/201115002997?text=Hello%20Khalil%20I%20want%20to%20work%20with%20you"
target="_blank" class="whatsapp">
<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
</a>

<script>

function openTab(id){
document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function openBrand(b){

const data={
hirisk:{
title:"Hi Risk",
desc:"Restaurant content",
links:[
["Instagram","https://www.instagram.com/hiriskcafe"],
["TikTok","https://www.tiktok.com/@hi_risk1"]
]
},
hameed:{
title:"Hameed",
desc:"Food content",
links:[
["Instagram","https://www.instagram.com/hameedegypt"]
]
},
ceramed:{
title:"Ceramed",
desc:"Cosmetics",
links:[
["Instagram","https://www.instagram.com/ceramed.pharma"]
]
},
mokbel:{
title:"Mokbel",
desc:"Architecture",
links:[
["Instagram","https://www.instagram.com/mokbeldesignco"]
]
},
flebiny:{
title:"Flebiny",
desc:"Barber",
links:[
["Work","https://drive.google.com"]
]
},
ads:{
title:"Ads",
desc:"Campaigns",
links:[
["TikTok","https://vt.tiktok.com"]
]
}
};

let item=data[b];

document.getElementById("title").innerText=item.title;
document.getElementById("desc").innerText=item.desc;

let html="";
item.links.forEach(l=>{
html+=`<a class="btn" href="${l[1]}" target="_blank">${l[0]}</a><br>`;
});

document.getElementById("links").innerHTML=html;
document.getElementById("popup").style.display="flex";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

</script>

</body>
</html>
